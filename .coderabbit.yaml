# CodeRabbit Configuration для Triplex-next Design System
# Дизайн-система SberBusiness на React 18 + TypeScript + Storybook

language: "ru"

early_access: true

tone_instructions: "Будь конструктивным и помогающим. Объясняй причины предложений. Предлагай альтернативы. Фокусируйся на важных проблемах. Отмечай хорошо сделанное."

# База знаний — документация из docs/ai/
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/ai/codestyle.md"
      - "docs/ai/tests.md"
      - "docs/ai/stories-guide.md"
      - "docs/ai/commits.md"
      - "docs/ai/CONTEXT.md"
      - "docs/ai/template-AI.md"

reviews:
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - release-0

  path_filters:
    - "!*.lock"
    - "!*.log"
    - "!node_modules/**"
    - "!dist/**"
    - "!storybook-static/**"
    - "!coverage/**"
    - "!public/**"
    - "!.husky/**"
    - "!__screenshots__/**"

  path_instructions:
    - path: "src/components/**/*.tsx"
      instructions: |
        Проверь по docs/ai/codestyle.md:
        - className и ...rest пробрасываются в корневой элемент
        - clsx для className — никакой конкатенации строк
        - Нет any, нет non-null assertions без комментария
        - Интерфейс props экспортируется
        - Нет inline styles (допустимо только для лейаута в stories)
        - Нет hardcoded строк в aria-label/title/placeholder внутри компонента — библиотека мультиязычная, текст всегда передаётся снаружи через props или ...rest

    - path: "src/components/**/styles/*.module.less"
      instructions: |
        Проверь по docs/ai/codestyle.md:
        - Все цветовые значения через CSS-переменные токенов (--triplex-next-*)
        - Нет !important без комментария с объяснением
        - Классы в camelCase
        - Нет hardcoded hex/rgb значений

    - path: "**/*.stories.tsx"
      instructions: |
        Проверь по docs/ai/stories-guide.md:
        - Для новых и существенно переписанных story-файлов: modern pattern с examples/, ?raw, копируемыми examples и публичными импортами из @sberbusiness/triplex-next
        - Playground: tags ["!autodocs"], testRunner skip, sourceState none
        - Все документационные стори в modern pattern: controls disable, source.code через ?raw
        - Для legacy stories не требуй отдельный рефакторинг структуры/import-style без задачи на миграцию
        - Сохраняй существующие story ids/export names, если нет явной причины менять их
        - Порядок в modern pattern: meta → Playground → Default → остальные

    - path: "stories/**/examples/*.tsx"
      instructions: |
        Проверь по docs/ai/stories-guide.md:
        - Пример самодостаточен и копируем целиком
        - Для modern examples импорты идут из @sberbusiness/triplex-next или публичных subentry, а не из src/...
        - Не требуй отдельную миграцию legacy examples без задачи на миграцию

    - path: "src/components/**/*test.tsx"
      instructions: |
        Проверь по docs/ai/tests.md:
        - Используется vitest (не jest): describe/it/expect/vi.fn()
        - Приоритет запросов: getByRole > getByLabelText > getByText > getByTestId
        - forwardRef покрыт тестом для новых компонентов и случаев, где менялся root/ref contract
        - Новый функционал и затронутые prop-варианты протестированы
        - Нет тестов на детали реализации; CSS-классы допустимы только если представляют публичный вариант или состояние
        - Учитывай локальный паттерн папки тестов (`__tests__`, `__test__`, `tests/`) и не требуй отдельной миграции структуры без задачи
        - Не требуй отдельной миграции import-style в существующих тестах без задачи на cleanup

    - path: "src/components/**/index.ts"
      instructions: |
        - Только экспорты, никакой логики
        - Всё, что было экспортировано ранее, должно оставаться (удаление = breaking change)
        - Named exports, не default

    - path: "src/index.ts"
      instructions: |
        - Все новые компоненты, интерфейсы и enum'ы должны быть экспортированы
        - Группировка по категориям

    - path: "e2e/**/*.spec.ts"
      instructions: |
        Проверь по docs/ai/tests.md:
        - Нет фиксированных таймаутов как основной синхронизации; короткий waitForTimeout(100-300ms) допустим только для CSS-анимации и должен быть обоснован
        - Тесты независимы друг от друга
        - URL — iframe конкретной Storybook story
        - Не ломай существующие story ids, на которые ссылаются e2e

    - path: "docs/ai/**/*.md"
      instructions: |
        - Документация на русском языке (исключение: AGENTS.md — намеренно на английском для совместимости с Codex и другими агентами)
        - Примеры кода должны соответствовать реальному коду в репозитории
        - Структура: чёткие заголовки, примеры кода, чек-листы где уместно
        - Не обещай наличие `{ComponentName}-AI.md` или Figma metadata для каждого компонента, если rollout ещё не завершён

    - path: "AGENTS.md"
      instructions: |
        - Документ на английском языке — это точка входа для OpenAI Codex и других агентов
        - Содержимое должно быть синхронизировано с CLAUDE.md: те же правила, тот же список файлов
        - Проверь, что ключевые ограничения (forwardRef, barrel exports, clsx, токены) перечислены в секции "Key constraints"

    - path: "CLAUDE.md"
      instructions: |
        - Документ на русском языке — это точка входа для Claude Code
        - Содержимое должно быть синхронизировано с AGENTS.md по смыслу: те же правила, тот же список файлов, тот же порядок действий

    - path: "src/components/**/*-AI.md"
      instructions: |
        - Frontmatter должен быть консистентным: `component`, `category`, `figma-node`, `figma-file`, `related`, `tokens`, `stories`, `version`
        - `figma-node` хранит raw-значение `node-id` из URL Figma (например, `1-328`), `figma-file` хранит URL файла / design-ссылку
        - Не дублируй TypeScript-типы целиком; описывай намерения, инварианты, accessibility-контракт и реальные ограничения компонента
        - Секция "История изменений" должна оставаться краткой и фактической

chat:
  auto_reply: true
